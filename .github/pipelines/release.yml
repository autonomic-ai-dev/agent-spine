version: 2
companion_workflows:
  - .github/workflows/ci.yml
pipelines:
  release:
    stages:
      - id: test
        workflow: .github/workflows/stage-test.yml

      - id: build
        workflow: .github/workflows/stage-build.yml
        needs:
          - test
        outputs:
          - run_id
          - version
          - git_sha

      - id: release-publish
        workflow: .github/workflows/stage-release-publish.yml
        needs:
          - build
        inputs:
          build_run_id: ${{ context.build.run_id }}
          version: ${{ context.build.version }}
          git_sha: ${{ context.build.git_sha }}

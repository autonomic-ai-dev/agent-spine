name: Pipeline Compose Orchestrator

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Pipeline Compose
        uses: aeswibon/pipeline-compose-run@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          pipeline_file: .github/pipelines/pipeline.yml

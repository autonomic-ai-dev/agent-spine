name: Reusable build

on:
  workflow_call:
    inputs:
      retention-days:
        description: Artifact retention in days
        type: number
        required: false
        default: 30
    secrets:
      APPLE_CERTIFICATE:
        required: false
      APPLE_CERTIFICATE_PASSWORD:
        required: false
      APPLE_IDENTITY:
        required: false


env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: agent-spine-aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
            artifact: agent-spine-x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: agent-spine-x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: agent-spine-aarch64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: agent-spine-x86_64-pc-windows-msvc.exe

    steps:
      - uses: actions/checkout@v7

      - name: Install Protobuf Compiler (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Protobuf Compiler (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install Protobuf Compiler (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2.9.1

      - name: Build release binary
        run: cargo build --release -p agent-spine --target ${{ matrix.target }}

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            cp "target/${{ matrix.target }}/release/agent-spine.exe" "dist/${{ matrix.artifact }}"
          else
            cp "target/${{ matrix.target }}/release/agent-spine" "dist/${{ matrix.artifact }}"
            chmod +x "dist/${{ matrix.artifact }}"
          fi

      - name: Import Apple signing certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        shell: bash
        run: |
          if [ -z "${APPLE_CERTIFICATE:-}" ]; then
            echo "APPLE_CERTIFICATE not set; skipping Developer ID import (will ad-hoc sign)"
            exit 0
          fi
          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychain -d user | tr -d '"')

      - name: Sign (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_IDENTITY: ${{ secrets.APPLE_IDENTITY }}
        shell: bash
        run: |
          BIN="dist/${{ matrix.artifact }}"
          xattr -cr "$BIN"
          if [ -n "${APPLE_IDENTITY:-}" ]; then
            echo "Signing with Developer ID: $APPLE_IDENTITY"
            codesign --force --options runtime --timestamp --sign "$APPLE_IDENTITY" "$BIN"
          else
            echo "APPLE_IDENTITY not set; ad-hoc signing"
            codesign --force --sign - "$BIN"
          fi
          codesign --verify --verbose "$BIN"
          codesign -dv --verbose=2 "$BIN" 2>&1 | head -20

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: ${{ inputs.retention-days }}

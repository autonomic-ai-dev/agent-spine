name: Stage test

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test and snapshot build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Protobuf Compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2.9.1

      - name: Resolve package metadata
        id: meta
        run: |
          version=$(grep '^version' agent-spine/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "git_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features

      - name: Run tests
        run: cargo test --release -p agent-spine -- --test-threads=1

      - name: Snapshot build
        run: cargo build --release -p agent-spine

      - name: Stage snapshot binary
        run: |
          mkdir -p dist
          cp target/release/agent-spine \
            "dist/agent-spine-snapshot-linux-x86_64-${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.git_sha }}"
          chmod +x "dist/agent-spine-snapshot-linux-x86_64-${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.git_sha }}"

      - name: Upload snapshot artifact
        uses: actions/upload-artifact@v7
        with:
          name: agent-spine-snapshot-linux-x86_64
          path: dist/agent-spine-snapshot-linux-x86_64-${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.git_sha }}
          if-no-files-found: error
          retention-days: 14

      - uses: aeswibon/pipeline-compose-export@v1.17.1
        if: success()
        with:
          stage_id: test
          outputs: >-
            {"version":"${{ steps.meta.outputs.version }}",
             "git_sha":"${{ steps.meta.outputs.git_sha }}",
             "snapshot_run_id":"${{ github.run_id }}"}

  frontend:
    name: Frontend check and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./dashboard
    steps:
      - uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type Check
        run: bun run check

      - name: Build
        run: bun run build

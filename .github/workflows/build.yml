name: Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Run build
        run: cargo build --release
      - name: Export Binary
        uses: aeswibon/pipeline-compose/packages/action-export@master
        with:
          path: target/release/agent-spine
          name: agent-spine-binary

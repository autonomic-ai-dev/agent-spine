name: Stage build

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      retention-days:
        description: Artifact retention in days
        type: number
        required: false
        default: 14

concurrency:
  group: stage-build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Multi-arch build
    uses: ./.github/workflows/reusable-build.yml
    with:
      retention-days: ${{ inputs.retention-days || 14 }}

  export:
    name: Export build stage context
    needs: build
    if: success()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Resolve package metadata
        id: meta
        run: |
          version=$(grep '^version' agent-spine/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - uses: aeswibon/pipeline-compose-export@v1.17.1
        with:
          stage_id: build
          outputs: >-
            {"run_id":"${{ github.run_id }}",
             "version":"${{ steps.meta.outputs.version }}",
             "git_sha":"${{ github.sha }}"}
